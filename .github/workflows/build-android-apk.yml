name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: true

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager "platforms;android-34"
          yes | sdkmanager "build-tools;34.0.0"
          yes | sdkmanager "platform-tools"

      - name: Install dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || npx cap sync android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-mobile-client-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

# ---------------------------------------------------------------
# After the workflow finishes:
#   1. Go to Actions -> this run -> Artifacts section
#   2. Download "opencode-mobile-client-apk"
#   3. Unzip it if needed to get app-debug.apk
#   4. Install: adb install -r app-debug.apk
#      (or transfer to phone and tap it in the file manager)
# ---------------------------------------------------------------
